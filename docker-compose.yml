services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ffpromo
      POSTGRES_PASSWORD: ffpromo
      POSTGRES_DB: ffpromo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  temporal:
    image: temporalio/admin-tools:1.27.2
    entrypoint:
      - temporal
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /tmp/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [prometheus]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  pgdata:
