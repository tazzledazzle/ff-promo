services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ffpromo
      POSTGRES_PASSWORD: ffpromo
      POSTGRES_DB: ffpromo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  temporal:
    image: temporalio/admin-tools:1.27.2
    entrypoint:
      - temporal
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /tmp/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [prometheus]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  web:
    profiles: [dev]
    image: node:24-bookworm-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "3001:3001"
    environment:
      API_URL: http://host.docker.internal:3000
      NEXT_PUBLIC_API_URL: /api/ff-promo
      NEXT_PUBLIC_DASHBOARD_ACTOR_ID: dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "corepack enable pnpm &&
      pnpm install &&
      pnpm --filter @ff-promo/web dev --hostname 0.0.0.0"

volumes:
  pgdata:
